<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kalshi Bot Control Room</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header class="shell-header">
      <a href="/" class="brand">Kalshi Bot Control Room</a>

  </body>
</html>
