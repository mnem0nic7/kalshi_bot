<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kalshi Bot Control Room</title>
    <link rel="stylesheet" href="/static/style.css" />
    {% block extra_head %}{% endblock %}
  </head>
  <body>
    <header class="shell-header">
      <div class="header-nav">
        <a href="/" class="brand">Kalshi Bot Control Room</a>
        <nav class="header-links" aria-label="Primary">
          <a href="/">Control Room</a>
          <a href="/faq">FAQ</a>
        </nav>
      </div>
      <div class="header-meta">
        <span>Color: {{ settings.app_color if settings else room.active_color }}</span>
      </div>
    </header>
    <main class="shell-main">
      {% block content %}{% endblock %}
    </main>
    {% block extra_scripts %}{% endblock %}
  </body>
</html>
