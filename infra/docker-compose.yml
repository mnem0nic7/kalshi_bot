services:
  postgres:
    image: pgvector/pgvector:pg16
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kalshi_bot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-kalshi_bot}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile
    command: ["alembic", "upgrade", "head"]
    env_file:
      - ../.env
    environment:
      APP_AUTO_INIT_DB: ${APP_AUTO_INIT_DB:-false}
      APP_ENABLE_KILL_SWITCH: ${APP_ENABLE_KILL_SWITCH:-true}
      APP_SHADOW_MODE: ${APP_SHADOW_MODE:-true}
      KALSHI_ENV: ${KALSHI_ENV:-demo}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-kalshi_bot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      LIVE_KALSHI_READ_PRIVATE_KEY_PATH: ${LIVE_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-live.pem}
      LIVE_KALSHI_WRITE_PRIVATE_KEY_PATH: ${LIVE_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-live.pem}
      DEMO_KALSHI_READ_PRIVATE_KEY_PATH: ${DEMO_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-demo.pem}
      DEMO_KALSHI_WRITE_PRIVATE_KEY_PATH: ${DEMO_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-demo.pem}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${LIVE_KALSHI_KEY_PATH_HOST:-../Kalshi-1.txt}:${LIVE_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-live.pem}:ro
      - ${DEMO_KALSHI_KEY_PATH_HOST:-../Kalshi-2-Demo.txt}:${DEMO_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-demo.pem}:ro
    restart: "no"

  app_blue:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile
    env_file:
      - ../.env
    environment:
      APP_AUTO_INIT_DB: ${APP_AUTO_INIT_DB:-false}
      APP_ENABLE_KILL_SWITCH: ${APP_ENABLE_KILL_SWITCH:-true}
      APP_SHADOW_MODE: ${APP_SHADOW_MODE:-true}
      KALSHI_ENV: ${KALSHI_ENV:-demo}
      APP_COLOR: blue
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-kalshi_bot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      LIVE_KALSHI_READ_PRIVATE_KEY_PATH: ${LIVE_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-live.pem}
      LIVE_KALSHI_WRITE_PRIVATE_KEY_PATH: ${LIVE_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-live.pem}
      DEMO_KALSHI_READ_PRIVATE_KEY_PATH: ${DEMO_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-demo.pem}
      DEMO_KALSHI_WRITE_PRIVATE_KEY_PATH: ${DEMO_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-demo.pem}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${LIVE_KALSHI_KEY_PATH_HOST:-../Kalshi-1.txt}:${LIVE_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-live.pem}:ro
      - ${DEMO_KALSHI_KEY_PATH_HOST:-../Kalshi-2-Demo.txt}:${DEMO_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-demo.pem}:ro
    expose:
      - "8000"
    restart: unless-stopped

  app_green:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile
    env_file:
      - ../.env
    environment:
      APP_AUTO_INIT_DB: ${APP_AUTO_INIT_DB:-false}
      APP_ENABLE_KILL_SWITCH: ${APP_ENABLE_KILL_SWITCH:-true}
      APP_SHADOW_MODE: ${APP_SHADOW_MODE:-true}
      KALSHI_ENV: ${KALSHI_ENV:-demo}
      APP_COLOR: green
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-kalshi_bot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      LIVE_KALSHI_READ_PRIVATE_KEY_PATH: ${LIVE_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-live.pem}
      LIVE_KALSHI_WRITE_PRIVATE_KEY_PATH: ${LIVE_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-live.pem}
      DEMO_KALSHI_READ_PRIVATE_KEY_PATH: ${DEMO_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-demo.pem}
      DEMO_KALSHI_WRITE_PRIVATE_KEY_PATH: ${DEMO_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-demo.pem}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${LIVE_KALSHI_KEY_PATH_HOST:-../Kalshi-1.txt}:${LIVE_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-live.pem}:ro
      - ${DEMO_KALSHI_KEY_PATH_HOST:-../Kalshi-2-Demo.txt}:${DEMO_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-demo.pem}:ro
    expose:
      - "8000"
    restart: unless-stopped

  daemon_blue:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile
    command: ["python", "-m", "kalshi_bot.cli", "daemon"]
    env_file:
      - ../.env
    environment:
      APP_AUTO_INIT_DB: ${APP_AUTO_INIT_DB:-false}
      APP_ENABLE_KILL_SWITCH: ${APP_ENABLE_KILL_SWITCH:-true}
      APP_SHADOW_MODE: ${APP_SHADOW_MODE:-true}
      KALSHI_ENV: ${KALSHI_ENV:-demo}
      APP_COLOR: blue
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-kalshi_bot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      LIVE_KALSHI_READ_PRIVATE_KEY_PATH: ${LIVE_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-live.pem}
      LIVE_KALSHI_WRITE_PRIVATE_KEY_PATH: ${LIVE_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-live.pem}
      DEMO_KALSHI_READ_PRIVATE_KEY_PATH: ${DEMO_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-demo.pem}
      DEMO_KALSHI_WRITE_PRIVATE_KEY_PATH: ${DEMO_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-demo.pem}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${LIVE_KALSHI_KEY_PATH_HOST:-../Kalshi-1.txt}:${LIVE_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-live.pem}:ro
      - ${DEMO_KALSHI_KEY_PATH_HOST:-../Kalshi-2-Demo.txt}:${DEMO_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-demo.pem}:ro
    restart: unless-stopped

  daemon_green:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile
    command: ["python", "-m", "kalshi_bot.cli", "daemon"]
    env_file:
      - ../.env
    environment:
      APP_AUTO_INIT_DB: ${APP_AUTO_INIT_DB:-false}
      APP_ENABLE_KILL_SWITCH: ${APP_ENABLE_KILL_SWITCH:-true}
      APP_SHADOW_MODE: ${APP_SHADOW_MODE:-true}
      KALSHI_ENV: ${KALSHI_ENV:-demo}
      APP_COLOR: green
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-kalshi_bot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      LIVE_KALSHI_READ_PRIVATE_KEY_PATH: ${LIVE_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-live.pem}
      LIVE_KALSHI_WRITE_PRIVATE_KEY_PATH: ${LIVE_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-live.pem}
      DEMO_KALSHI_READ_PRIVATE_KEY_PATH: ${DEMO_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-demo.pem}
      DEMO_KALSHI_WRITE_PRIVATE_KEY_PATH: ${DEMO_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-demo.pem}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${LIVE_KALSHI_KEY_PATH_HOST:-../Kalshi-1.txt}:${LIVE_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-live.pem}:ro
      - ${DEMO_KALSHI_KEY_PATH_HOST:-../Kalshi-2-Demo.txt}:${DEMO_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-demo.pem}:ro
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app_blue
      - app_green
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  postgres_data:
