x-build: &build
  build:
    context: ..
    dockerfile: infra/docker/Dockerfile

x-common-env-base: &common-env-base
  APP_AUTO_INIT_DB: ${APP_AUTO_INIT_DB:-false}
  APP_ENABLE_KILL_SWITCH: ${APP_ENABLE_KILL_SWITCH:-true}
  APP_SHADOW_MODE: ${APP_SHADOW_MODE:-false}
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${POSTGRES_DB:-kalshi_bot}
  POSTGRES_USER: ${POSTGRES_USER:-postgres}

x-demo-env: &demo-env
  <<: *common-env-base
  POSTGRES_HOST: postgres_demo
  DEMO_KALSHI_READ_PRIVATE_KEY_PATH: ${DEMO_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-demo.pem}
  DEMO_KALSHI_WRITE_PRIVATE_KEY_PATH: ${DEMO_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-demo.pem}

x-production-env: &production-env
  <<: *common-env-base
  POSTGRES_HOST: postgres_production
  LIVE_KALSHI_READ_PRIVATE_KEY_PATH: ${LIVE_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-live.pem}
  LIVE_KALSHI_WRITE_PRIVATE_KEY_PATH: ${LIVE_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-live.pem}

x-demo-web-env: &demo-web-env
  <<: *demo-env
  WEB_DEMO_HOST: ${WEB_DEMO_HOST:-demo.ai-al.site}
  WEB_PRODUCTION_HOST: ${WEB_PRODUCTION_HOST:-prod.ai-al.site}
  WEB_STRATEGIES_HOST: ${WEB_STRATEGIES_HOST:-strategy.ai-al.site}
  WEB_AUTH_COOKIE_DOMAIN: ${WEB_AUTH_COOKIE_DOMAIN:-.ai-al.site}

x-production-web-env: &production-web-env
  <<: *production-env
  WEB_DEMO_HOST: ${WEB_DEMO_HOST:-demo.ai-al.site}
  WEB_PRODUCTION_HOST: ${WEB_PRODUCTION_HOST:-prod.ai-al.site}
  WEB_STRATEGIES_HOST: ${WEB_STRATEGIES_HOST:-strategy.ai-al.site}
  WEB_AUTH_COOKIE_DOMAIN: ${WEB_AUTH_COOKIE_DOMAIN:-.ai-al.site}

x-demo-key-volumes: &demo-key-volumes
  - ${DEMO_KALSHI_KEY_PATH_HOST:-../Kalshi-2-Demo.txt}:${DEMO_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-demo.pem}:ro

x-production-key-volumes: &production-key-volumes
  - ${LIVE_KALSHI_KEY_PATH_HOST:-../Kalshi-1.txt}:${LIVE_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-live.pem}:ro

x-app-common: &app-common
  <<: *build
  env_file: [../.env]
  expose: ["8000"]
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=5).read()"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 30s
  restart: unless-stopped

x-demo-app-base: &demo-app-base
  <<: *app-common
  volumes: *demo-key-volumes
  depends_on:
    postgres_demo:
      condition: service_healthy
    migrate_demo:
      condition: service_completed_successfully

x-production-app-base: &production-app-base
  <<: *app-common
  volumes: *production-key-volumes
  depends_on:
    postgres_production:
      condition: service_healthy
    migrate_production:
      condition: service_completed_successfully

x-daemon-common: &daemon-common
  <<: *build
  command: ["python", "-m", "kalshi_bot.cli", "daemon"]
  env_file: [../.env]
  restart: unless-stopped

x-demo-daemon-base: &demo-daemon-base
  <<: *daemon-common
  volumes: *demo-key-volumes
  depends_on:
    postgres_demo:
      condition: service_healthy
    migrate_demo:
      condition: service_completed_successfully

x-production-daemon-base: &production-daemon-base
  <<: *daemon-common
  volumes: *production-key-volumes
  depends_on:
    postgres_production:
      condition: service_healthy
    migrate_production:
      condition: service_completed_successfully

services:
  postgres_demo:
    image: pgvector/pgvector:pg16
    env_file: [../.env]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kalshi_bot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-kalshi_bot}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "127.0.0.1:${POSTGRES_DEMO_PORT:-5432}:5432"
    volumes:
      - postgres_demo_data:/var/lib/postgresql/data

  postgres_production:
    image: pgvector/pgvector:pg16
    env_file: [../.env]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kalshi_bot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-kalshi_bot}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "127.0.0.1:${POSTGRES_PRODUCTION_PORT:-5433}:5432"
    volumes:
      - postgres_production_data:/var/lib/postgresql/data

  migrate_demo:
    <<: *build
    command: ["alembic", "upgrade", "head"]
    env_file: [../.env]
    environment:
      <<: *demo-env
      KALSHI_ENV: demo
    volumes: *demo-key-volumes
    depends_on:
      postgres_demo:
        condition: service_healthy
    restart: "no"

  migrate_production:
    <<: *build
    command: ["alembic", "upgrade", "head"]
    env_file: [../.env]
    environment:
      <<: *production-env
      KALSHI_ENV: production
    volumes: *production-key-volumes
    depends_on:
      postgres_production:
        condition: service_healthy
    restart: "no"

  app_demo_blue:
    <<: *demo-app-base
    environment:
      <<: *demo-env
      KALSHI_ENV: demo
      APP_COLOR: blue

  app_demo_green:
    <<: *demo-app-base
    environment:
      <<: *demo-env
      KALSHI_ENV: demo
      APP_COLOR: green

  app_production_blue:
    <<: *production-app-base
    environment:
      <<: *production-env
      KALSHI_ENV: production
      APP_COLOR: blue

  app_production_green:
    <<: *production-app-base
    environment:
      <<: *production-env
      KALSHI_ENV: production
      APP_COLOR: green

  daemon_demo_blue:
    <<: *demo-daemon-base
    environment:
      <<: *demo-env
      KALSHI_ENV: demo
      APP_COLOR: blue
    healthcheck:
      test: ["CMD", "python", "-m", "kalshi_bot.cli", "health-check", "daemon", "--color", "blue"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 90s

  daemon_demo_green:
    <<: *demo-daemon-base
    environment:
      <<: *demo-env
      KALSHI_ENV: demo
      APP_COLOR: green
    healthcheck:
      test: ["CMD", "python", "-m", "kalshi_bot.cli", "health-check", "daemon", "--color", "green"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 90s

  daemon_production_blue:
    <<: *production-daemon-base
    environment:
      <<: *production-env
      KALSHI_ENV: production
      APP_COLOR: blue
    healthcheck:
      test: ["CMD", "python", "-m", "kalshi_bot.cli", "health-check", "daemon", "--color", "blue"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 90s

  daemon_production_green:
    <<: *production-daemon-base
    environment:
      <<: *production-env
      KALSHI_ENV: production
      APP_COLOR: green
    healthcheck:
      test: ["CMD", "python", "-m", "kalshi_bot.cli", "health-check", "daemon", "--color", "green"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 90s

  web_demo:
    <<: *demo-app-base
    environment:
      <<: *demo-web-env
      APP_COLOR: ${WEB_APP_COLOR:-blue}
      KALSHI_ENV: demo
      WEB_SITE_KIND: demo

  web_production:
    <<: *production-app-base
    environment:
      <<: *production-web-env
      APP_COLOR: ${WEB_APP_COLOR:-blue}
      KALSHI_ENV: production
      WEB_SITE_KIND: production

  web_strategies:
    <<: *demo-app-base
    environment:
      <<: *demo-web-env
      APP_COLOR: ${WEB_APP_COLOR:-blue}
      KALSHI_ENV: demo
      WEB_SITE_KIND: strategies

  caddy:
    image: caddy:2.9-alpine
    env_file: [../.env]
    environment:
      WEB_DEMO_HOST: ${WEB_DEMO_HOST:-demo.ai-al.site}
      WEB_PRODUCTION_HOST: ${WEB_PRODUCTION_HOST:-prod.ai-al.site}
      WEB_STRATEGIES_HOST: ${WEB_STRATEGIES_HOST:-strategy.ai-al.site}
    depends_on:
      - web_demo
      - web_production
      - web_strategies
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:2019/config/ >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres_demo_data:
  postgres_production_data:
  caddy_data:
  caddy_config:
