      POSTGRES_DB: ${POSTGRES_DB:-kalshi_bot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      LIVE_KALSHI_READ_PRIVATE_KEY_PATH: ${LIVE_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-live.pem}
      LIVE_KALSHI_WRITE_PRIVATE_KEY_PATH: ${LIVE_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-live.pem}
      DEMO_KALSHI_READ_PRIVATE_KEY_PATH: ${DEMO_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-demo.pem}
      DEMO_KALSHI_WRITE_PRIVATE_KEY_PATH: ${DEMO_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-demo.pem}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${LIVE_KALSHI_KEY_PATH_HOST:-../Kalshi-1.txt}:${LIVE_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-live.pem}:ro
      - ${DEMO_KALSHI_KEY_PATH_HOST:-../Kalshi-2-Demo.txt}:${DEMO_KALSHI_KEY_PATH_CONTAINER:-/run/secrets/kalshi-demo.pem}:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  caddy:
    image: caddy:2.9-alpine
    env_file:
      - ../.env
    environment:
      WEB_DEMO_HOST: ${WEB_DEMO_HOST:-demo.ai-al.site}
      WEB_PRODUCTION_HOST: ${WEB_PRODUCTION_HOST:-prod.ai-al.site}
      WEB_STRATEGIES_HOST: ${WEB_STRATEGIES_HOST:-strategy.ai-al.site}
    depends_on:
      - web_demo
      - web_production
      - web_strategies
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
