name: Self Improve

"on":
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: Days of shadow/demo rooms to inspect
        default: "14"
      limit:
        description: Max room count to include
        default: "200"
      stage_candidate:
        description: Stage a passing candidate on the inactive color
        type: boolean
        default: true
      target:
        description: Improvement target to run
        type: choice
        options:
          - parameter_pack
          - agent_pack_legacy
        default: parameter_pack

permissions:
  contents: read

jobs:
  offline-guard:
    name: Offline Guard Rails
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run self-improve test slice
        run: |
          set -euo pipefail
          python -m pytest -q \
            tests/unit/test_provider_router_gemini.py \
            tests/unit/test_agent_pack_service.py \
            tests/unit/test_self_improve_service.py \
            tests/unit/test_parameter_pack.py \
            tests/unit/test_promotion_gates.py \
            tests/unit/test_drift_watcher.py \
            tests/unit/test_learned_head.py \
            tests/unit/test_nws_discussion_parser.py \
            tests/integration/test_parameter_pack_repository.py \
            tests/integration/test_parameter_pack_promotion_service.py \
            tests/integration/test_training_export_service.py

  remote-loop:
    name: Remote Critique, Eval, and Stage
    runs-on: ubuntu-latest
    needs: offline-guard
    timeout-minutes: 30
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
      DEPLOY_SSH_ADDRESS_FAMILY: ${{ secrets.DEPLOY_SSH_ADDRESS_FAMILY || 'inet' }}
      DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || secrets.GEMINI_KEY }}
      INPUT_DAYS: ${{ github.event.inputs.days }}
      INPUT_LIMIT: ${{ github.event.inputs.limit }}
      INPUT_STAGE_CANDIDATE: ${{ github.event.inputs.stage_candidate }}
      INPUT_TARGET: ${{ github.event.inputs.target }}
    steps:
      - name: Skip when deploy secrets are missing
        if: env.DEPLOY_HOST == '' || env.DEPLOY_USER == '' || env.DEPLOY_SSH_KEY == '' || env.DEPLOY_APP_DIR == ''
        run: |
          {
            echo "## Self Improve"
            echo
            echo "Skipped remote self-improve because one or more required deploy secrets are missing."
            echo "Needed: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_APP_DIR"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Prepare SSH
        if: env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_SSH_KEY != '' && env.DEPLOY_APP_DIR != ''
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if ! [[ "${DEPLOY_SSH_PORT}" =~ ^[0-9]+$ ]] || (( DEPLOY_SSH_PORT < 1 || DEPLOY_SSH_PORT > 65535 )); then
            echo "Invalid DEPLOY_SSH_PORT: ${DEPLOY_SSH_PORT}" >&2
            exit 1
          fi
          case "${DEPLOY_SSH_ADDRESS_FAMILY}" in
            any|inet|inet6) ;;
            *) echo "Invalid DEPLOY_SSH_ADDRESS_FAMILY: ${DEPLOY_SSH_ADDRESS_FAMILY}" >&2; exit 1 ;;
          esac
          keyscan_family_flag=()
          case "${DEPLOY_SSH_ADDRESS_FAMILY}" in
            inet) keyscan_family_flag=(-4) ;;
            inet6) keyscan_family_flag=(-6) ;;
          esac
          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          if ! ssh-keyscan "${keyscan_family_flag[@]}" -p "${DEPLOY_SSH_PORT}" -T 15 -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts 2>ssh-keyscan.err; then
            cat ssh-keyscan.err >&2 || true
            echo "::warning::ssh-keyscan failed for ${DEPLOY_HOST}:${DEPLOY_SSH_PORT}; SSH will use StrictHostKeyChecking=accept-new"
          fi

      - name: Run parameter-pack or legacy agent self-improve
        if: env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_SSH_KEY != '' && env.DEPLOY_APP_DIR != ''
        id: self_improve
        run: |
          set -euo pipefail

          days="${INPUT_DAYS:-14}"
          limit="${INPUT_LIMIT:-200}"
          stage_candidate="${INPUT_STAGE_CANDIDATE:-true}"
          target="${INPUT_TARGET:-parameter_pack}"
          case "${target}" in
            parameter_pack|agent_pack_legacy) ;;
            *) echo "Invalid self-improve target: ${target}" >&2; exit 1 ;;
          esac
          ssh_cmd=(
            ssh
            -i ~/.ssh/id_ed25519
            -p "${DEPLOY_SSH_PORT}"
            -o StrictHostKeyChecking=accept-new
            -o UserKnownHostsFile="${HOME}/.ssh/known_hosts"
            -o "AddressFamily=${DEPLOY_SSH_ADDRESS_FAMILY}"
            -o ConnectTimeout=20
            -o ServerAliveInterval=30
            -o ServerAliveCountMax=3
            "${DEPLOY_USER}@${DEPLOY_HOST}"
          )

          app_dir_quoted="$(printf '%q' "${DEPLOY_APP_DIR}")"
          remote_cd="cd ${app_dir_quoted}"

          if [[ "${target}" == "parameter_pack" ]]; then
            hard_caps_json="$("${ssh_cmd[@]}" "${remote_cd} && APP_SERVICE=app_demo_blue infra/scripts/run-parameter-pack.sh hard-caps")"
            printf '%s\n' "${hard_caps_json}" > parameter-hard-caps.json
            jq -e 'type == "object" and (.config_hash | type == "string") and (.hard_caps | type == "object")' parameter-hard-caps.json >/dev/null

            parameter_status_json="$("${ssh_cmd[@]}" "${remote_cd} && APP_SERVICE=app_demo_blue infra/scripts/run-parameter-pack.sh status")"
            printf '%s\n' "${parameter_status_json}" > parameter-status.json
            jq -e 'type == "object" and (.kalshi_env | type == "string") and (.parameter_packs | type == "object") and (.promotion_starvation | type == "object")' parameter-status.json >/dev/null

            {
              echo "candidate_version="
              echo "evaluation_run_id="
              echo "passed=false"
              echo "staged=false"
              echo "inactive_color="
            } >> "${GITHUB_OUTPUT}"

            {
              echo "## Self Improve"
              echo
              echo "- Target: \`parameter_pack\`"
              echo "- Status: \`not_ready_for_parameter_pack_replay\`"
              echo "- Live risk changed: \`false\`"
              echo "- Hard-cap config hash: \`$(jq -r '.config_hash' parameter-hard-caps.json)\`"
              echo "- Active color: \`$(jq -r '.active_color' parameter-status.json)\`"
              echo
              echo "Parameter-pack scheduled automation is active only as a preflight in this pass."
              echo "It requires replay search artifacts and passing holdout gates before staging any candidate."
              echo
              echo "### Parameter-Pack Status"
              echo '```json'
              cat parameter-status.json
              echo
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          if [[ -z "${GEMINI_API_KEY}" ]]; then
            {
              echo "candidate_version="
              echo "evaluation_run_id="
              echo "passed=false"
              echo "staged=false"
              echo "inactive_color="
            } >> "${GITHUB_OUTPUT}"

            {
              echo "## Self Improve"
              echo
              echo "- Target: \`agent_pack_legacy\`"
              echo "- Status: \`skipped_missing_gemini_secret\`"
              echo "Needed for legacy agent-pack mode only: GEMINI_KEY or GEMINI_API_KEY"
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          gemini_quoted="$(printf '%q' "${GEMINI_API_KEY}")"
          remote_prefix="${remote_cd} && export GEMINI_API_KEY=${gemini_quoted}"

          sync_json="$("${ssh_cmd[@]}" "${remote_prefix} && python3 -c \"from pathlib import Path; import json, os; env_path = Path('.env'); gemini = os.environ['GEMINI_API_KEY']; lines = env_path.read_text(encoding='utf-8').splitlines() if env_path.exists() else []; updated = []; found = False; [updated.append(f'GEMINI_API_KEY={gemini}') if line.startswith('GEMINI_API_KEY=') else updated.append(line) for line in lines]; found = any(line.startswith('GEMINI_API_KEY=') for line in lines); updated = updated if found else updated + [f'GEMINI_API_KEY={gemini}']; env_path.write_text('\\n'.join(updated) + '\\n', encoding='utf-8'); print(json.dumps({'synced': True}))\"")"
          printf '%s\n' "${sync_json}" > sync.json
          jq -e 'type == "object" and .synced == true' sync.json >/dev/null

          status_json="$("${ssh_cmd[@]}" "${remote_prefix} && APP_SERVICE=app_demo_blue infra/scripts/run-self-improve.sh status")"
          printf '%s\n' "${status_json}" > status.json
          jq -e 'type == "object" and (.training_readiness.ready_for_critique | type == "boolean") and (.training_readiness.ready_for_promotion | type == "boolean")' status.json >/dev/null
          ready_for_critique="$(jq -r '.training_readiness.ready_for_critique' status.json)"
          ready_for_promotion="$(jq -r '.training_readiness.ready_for_promotion' status.json)"

          if [[ "${ready_for_critique}" != "true" ]]; then
            {
              echo "candidate_version="
              echo "evaluation_run_id="
              echo "passed=false"
              echo "staged=false"
              echo "inactive_color="
            } >> "${GITHUB_OUTPUT}"

            {
              echo "## Self Improve"
              echo
              echo "- Gemini env synced on remote host: \`$(jq -r '.synced' sync.json)\`"
              echo "- Status: \`not_ready_for_critique\`"
              echo "- Ready for critique: \`${ready_for_critique}\`"
              echo "- Ready for promotion: \`${ready_for_promotion}\`"
              echo
              echo "### Missing Indicators"
              echo '```json'
              jq '.training_readiness.missing_indicators // []' status.json
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          critique_json="$("${ssh_cmd[@]}" "${remote_prefix} && APP_SERVICE=app_demo_blue infra/scripts/run-self-improve.sh critique --days ${days} --limit ${limit}")"
          printf '%s\n' "${critique_json}" > critique.json
          jq -e 'type == "object"' critique.json >/dev/null
          candidate_version="$(jq -r '.candidate_version // empty' critique.json)"
          if [[ -z "${candidate_version}" ]]; then
            echo "Candidate version missing from critique output" >&2
            exit 1
          fi

          eval_json="$("${ssh_cmd[@]}" "${remote_prefix} && APP_SERVICE=app_demo_blue infra/scripts/run-self-improve.sh eval --candidate-version ${candidate_version} --days ${days} --limit ${limit}")"
          printf '%s\n' "${eval_json}" > eval.json
          jq -e 'type == "object" and (.passed | type == "boolean")' eval.json >/dev/null
          evaluation_run_id="$(jq -r '.evaluation_run_id // empty' eval.json)"
          if [[ -z "${evaluation_run_id}" ]]; then
            echo "Evaluation run id missing from eval output" >&2
            exit 1
          fi
          passed="$(jq -r '.passed // false' eval.json)"

          staged="false"
          inactive_color=""
          if [[ "${passed}" == "true" && "${stage_candidate}" == "true" ]]; then
            promotion_status_json="$("${ssh_cmd[@]}" "${remote_prefix} && APP_SERVICE=app_demo_blue infra/scripts/run-self-improve.sh status")"
            printf '%s\n' "${promotion_status_json}" > promotion-status.json
            jq -e 'type == "object" and (.training_readiness.ready_for_promotion | type == "boolean")' promotion-status.json >/dev/null
            ready_for_promotion="$(jq -r '.training_readiness.ready_for_promotion' promotion-status.json)"
            if [[ "${ready_for_promotion}" != "true" ]]; then
              {
                echo "## Self Improve"
                echo
                echo "- Gemini env synced on remote host: \`$(jq -r '.synced' sync.json)\`"
                echo "- Candidate version: \`${candidate_version}\`"
                echo "- Evaluation run: \`${evaluation_run_id}\`"
                echo "- Passed: \`${passed}\`"
                echo "- Staged on inactive color: \`false\`"
                echo "- Status: \`not_ready_for_promotion\`"
                echo
                echo "### Missing Indicators"
                echo '```json'
                jq '.training_readiness.missing_indicators // []' promotion-status.json
                echo '```'
                echo
                echo "### Evaluation"
                echo '```json'
                cat eval.json
                echo
                echo '```'
              } >> "${GITHUB_STEP_SUMMARY}"

              {
                echo "candidate_version=${candidate_version}"
                echo "evaluation_run_id=${evaluation_run_id}"
                echo "passed=${passed}"
                echo "staged=false"
                echo "inactive_color="
              } >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            promote_json="$("${ssh_cmd[@]}" "${remote_prefix} && APP_SERVICE=app_demo_blue infra/scripts/run-self-improve.sh promote --evaluation-run-id ${evaluation_run_id} --reason github_actions_self_improve")"
            printf '%s\n' "${promote_json}" > promote.json
            jq -e 'type == "object"' promote.json >/dev/null
            inactive_color="$(jq -r '.inactive_color // empty' promote.json)"
            if [[ -z "${inactive_color}" ]]; then
              echo "Inactive color missing from promote output" >&2
              exit 1
            fi
            "${ssh_cmd[@]}" "cd ${app_dir_quoted} && infra/scripts/restart-color.sh ${inactive_color}"
            staged="true"
          fi

          {
            echo "candidate_version=${candidate_version}"
            echo "evaluation_run_id=${evaluation_run_id}"
            echo "passed=${passed}"
            echo "staged=${staged}"
            echo "inactive_color=${inactive_color}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "## Self Improve"
            echo
            echo "- Gemini env synced on remote host: \`$(jq -r '.synced' <<<"${sync_json}")\`"
            echo "- Candidate version: \`${candidate_version}\`"
            echo "- Evaluation run: \`${evaluation_run_id}\`"
            echo "- Passed: \`${passed}\`"
            echo "- Staged on inactive color: \`${staged}\`"
            echo "- Ready for promotion: \`${ready_for_promotion}\`"
            if [[ -n "${inactive_color}" ]]; then
              echo "- Inactive color restarted: \`${inactive_color}\`"
            fi
            echo
            echo "### Evaluation"
            echo '```json'
            cat eval.json
            echo
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
