name: Redeploy

"on":
  workflow_dispatch:
    inputs:
      color:
        description: "Color to restart: blue, green, or both (default: both)"
        default: "both"
        type: choice
        options:
          - both
          - blue
          - green

permissions:
  contents: read

jobs:
  redeploy:
    name: Pull and Restart on VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
      DEPLOY_SSH_ADDRESS_FAMILY: ${{ secrets.DEPLOY_SSH_ADDRESS_FAMILY || 'inet' }}
      DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
      INPUT_COLOR: ${{ github.event.inputs.color }}

    steps:
      - name: Validate secrets
        run: |
          set -euo pipefail
          for var in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_APP_DIR; do
            test -n "${!var}" || { echo "Missing secret: ${var}"; exit 1; }
          done
          if ! [[ "${DEPLOY_SSH_PORT}" =~ ^[0-9]+$ ]] || (( DEPLOY_SSH_PORT < 1 || DEPLOY_SSH_PORT > 65535 )); then
            echo "Invalid DEPLOY_SSH_PORT: ${DEPLOY_SSH_PORT}" >&2
            exit 1
          fi
          case "${DEPLOY_SSH_ADDRESS_FAMILY}" in
            any|inet|inet6) ;;
            *) echo "Invalid DEPLOY_SSH_ADDRESS_FAMILY: ${DEPLOY_SSH_ADDRESS_FAMILY}" >&2; exit 1 ;;
          esac

      - name: Prepare SSH
        run: |
          set -euo pipefail
          keyscan_family_flag=()
          case "${DEPLOY_SSH_ADDRESS_FAMILY}" in
            inet) keyscan_family_flag=(-4) ;;
            inet6) keyscan_family_flag=(-6) ;;
          esac
          mkdir -p ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          if ! ssh-keyscan "${keyscan_family_flag[@]}" -p "${DEPLOY_SSH_PORT}" -T 15 -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts 2>ssh-keyscan.err; then
            cat ssh-keyscan.err >&2 || true
            echo "::warning::ssh-keyscan failed for ${DEPLOY_HOST}:${DEPLOY_SSH_PORT}; SSH will use StrictHostKeyChecking=accept-new"
          fi

      - name: Pull latest and restart
        run: |
          set -euo pipefail
          app_dir_quoted="$(printf '%q' "${DEPLOY_APP_DIR}")"
          ssh_cmd=(
            ssh
            -i ~/.ssh/id_ed25519
            -p "${DEPLOY_SSH_PORT}"
            -o StrictHostKeyChecking=accept-new
            -o UserKnownHostsFile="${HOME}/.ssh/known_hosts"
            -o "AddressFamily=${DEPLOY_SSH_ADDRESS_FAMILY}"
            -o ConnectTimeout=20
            -o ServerAliveInterval=30
            -o ServerAliveCountMax=3
            "${DEPLOY_USER}@${DEPLOY_HOST}"
          )

          # Validate color to prevent injection (choice input, but be explicit)
          color="${INPUT_COLOR:-both}"
          case "${color}" in
            blue|green|both) ;;
            *) echo "Invalid color: ${color}" >&2; exit 1 ;;
          esac

          if [[ "${color}" == "both" ]]; then
            colors="blue green"
          else
            colors="${color}"
          fi

          "${ssh_cmd[@]}" \
            "cd ${app_dir_quoted} && git pull --ff-only"

          "${ssh_cmd[@]}" \
            "cd ${app_dir_quoted} && docker compose -f infra/docker-compose.yml --env-file .env up -d postgres_demo postgres_production"

          "${ssh_cmd[@]}" \
            "cd ${app_dir_quoted} && docker compose -f infra/docker-compose.yml --env-file .env run --rm --build --no-deps migrate_demo"

          "${ssh_cmd[@]}" \
            "cd ${app_dir_quoted} && docker compose -f infra/docker-compose.yml --env-file .env run --rm --build --no-deps migrate_production"

          for c in ${colors}; do
            "${ssh_cmd[@]}" \
              "cd ${app_dir_quoted} && infra/scripts/restart-color.sh ${c}"
          done

          {
            echo "## Redeploy"
            echo
            echo "- Host: \`${DEPLOY_HOST}\`"
            echo "- SSH port: \`${DEPLOY_SSH_PORT}\`"
            echo "- SSH address family: \`${DEPLOY_SSH_ADDRESS_FAMILY}\`"
            echo "- Color(s): \`${color}\`"
            echo "- Ref: \`${GITHUB_SHA}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
